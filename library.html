<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monster and Memories Spell Lists</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-library">

  <!-- HEADER -->
  <header>
    <div class="site-title">Monster <span>&amp;</span> Memories <span class="title-sub">Spell Lists</span></div>
    <nav>
      <a href="https://monstersandmemories.com/" target="_blank" rel="noopener" class="nav-icon-link">
        <img src="https://monstersandmemories.com/favicon.ico" alt="" class="nav-icon" onerror="this.style.display='none'" />
        Official Site
      </a>
      <a href="https://monstersandmemories.miraheze.org/wiki/Main_Page" target="_blank" rel="noopener" class="nav-icon-link">
        <img src="assets/wiki.jpg" alt="" class="nav-icon" />
        Wiki
      </a>
      <a href="index.html" class="nav-highlight">&#8592; Party Planner</a>
    </nav>
  </header>

  <main>
    <section>
      <div class="section-label">Detailed Class Overview &amp; Spell Library</div>

      <!-- CLASS FILTER BUTTONS -->
      <div class="lib-filter-block">
        <div class="lib-filter-label">Filter by Class</div>

        <div class="lib-class-toggles">
          <button id="btn-select-all" class="class-btn lib-toggle-btn">Select All</button>
          <button id="btn-clear-all" class="class-btn lib-toggle-btn">Clear All</button>
        </div>

        <div class="lib-role-groups">

          <div class="role-group">
            <span class="role-label dps">DPS</span>
            <div class="role-btn-group">
              <button class="class-btn lib-class-btn active" data-class="Elementalist">Elementalist</button>
              <button class="class-btn lib-class-btn active" data-class="Necromancer">Necromancer</button>
              <button class="class-btn lib-class-btn active" data-class="Wizard">Wizard</button>
              <button class="class-btn lib-class-btn active" data-class="Archer">Archer</button>
              <button class="class-btn lib-class-btn active" data-class="Ranger">Ranger</button>
              <button class="class-btn lib-class-btn active" data-class="Beastmaster">Beastmaster</button>
              <button class="class-btn lib-class-btn active" data-class="Monk">Monk</button>
              <button class="class-btn lib-class-btn active" data-class="Rogue">Rogue</button>
              <button class="class-btn lib-class-btn active" data-class="Spellblade">Spellblade</button>
            </div>
          </div>

          <div class="role-group">
            <span class="role-label healer">Healer</span>
            <div class="role-btn-group">
              <button class="class-btn lib-class-btn active" data-class="Cleric">Cleric</button>
              <button class="class-btn lib-class-btn active" data-class="Druid">Druid</button>
              <button class="class-btn lib-class-btn active" data-class="Shaman">Shaman</button>
            </div>
          </div>

          <div class="role-group">
            <span class="role-label support">Support</span>
            <div class="role-btn-group">
              <button class="class-btn lib-class-btn active" data-class="Enchanter">Enchanter</button>
              <button class="class-btn lib-class-btn active" data-class="Bard">Bard</button>
            </div>
          </div>

          <div class="role-group">
            <span class="role-label tank">Tank</span>
            <div class="role-btn-group">
              <button class="class-btn lib-class-btn active" data-class="Fighter">Fighter</button>
              <button class="class-btn lib-class-btn active" data-class="Inquisitor">Inquisitor</button>
              <button class="class-btn lib-class-btn active" data-class="Paladin">Paladin</button>
              <button class="class-btn lib-class-btn active" data-class="Shadow Knight">Shadow Knight</button>
            </div>
          </div>

        </div>
      </div>

      <!-- SEARCH + OTHER FILTERS -->
      <div class="lib-filter-block">
        <div class="lib-filter-row">

          <div class="lib-filter-group">
            <label class="lib-filter-label" for="search-input">Search Spell Name / Description</label>
            <input type="text" id="search-input" placeholder="Search..." />
          </div>

          <div class="lib-filter-group">
            <label class="lib-filter-label" for="filter-tag">Filter by Tag</label>
            <select id="filter-tag">
              <option value="">All Tags</option>
              <option value="__cat__DAMAGE" class="dropdown-cat-option cat-damage">▶ DAMAGE</option>
              <option class="opt-damage">Direct Damage</option>
              <option class="opt-damage">Damage Over Time</option>
              <option value="__cat__CROWD CONTROL" class="dropdown-cat-option cat-cc">▶ CROWD CONTROL</option>
              <option class="opt-cc">Fear</option>
              <option class="opt-cc">Mez</option>
              <option class="opt-cc">Stun</option>
              <option class="opt-cc">Charm</option>
              <option class="opt-cc">Pacify</option>
              <option class="opt-cc">Snare</option>
              <option class="opt-cc">Root</option>
              <option class="opt-cc">Blind</option>
              <option class="opt-cc">Interrupt</option>
              <option value="__cat__DEBUFFS" class="dropdown-cat-option cat-debuff">▶ DEBUFFS</option>
              <option class="opt-debuff">Slow</option>
              <option class="opt-debuff">Stat Debuff</option>
              <option class="opt-debuff">Spell Damage Vulnerability</option>
              <option class="opt-debuff">Physical Damage Vulnerability</option>
              <option class="opt-debuff">Reduced Healing</option>
              <option class="opt-debuff">Mana Burn</option>
              <option class="opt-debuff">Lower Resistance</option>
              <option value="__cat__HEALING" class="dropdown-cat-option cat-healing">▶ HEALING</option>
              <option class="opt-healing">Heal Over Time</option>
              <option class="opt-healing">Direct Heal</option>
              <option class="opt-healing">Lifesteal</option>
              <option class="opt-healing">Lifetap</option>
              <option class="opt-healing">Resurrection</option>
              <option value="__cat__BUFF" class="dropdown-cat-option cat-buff">▶ BUFF</option>
              <option class="opt-buff">+HP</option>
              <option class="opt-buff">+AC</option>
              <option class="opt-buff">+STR</option>
              <option class="opt-buff">+STA</option>
              <option class="opt-buff">+DEX</option>
              <option class="opt-buff">+AGI</option>
              <option class="opt-buff">+INT</option>
              <option class="opt-buff">+CHA</option>
              <option class="opt-buff">+WIS</option>
              <option class="opt-buff">Increase Physical Damage</option>
              <option class="opt-buff">Increase Spell Damage</option>
              <option class="opt-buff">Movement Speed</option>
              <option class="opt-buff">Melee Haste</option>
              <option class="opt-buff">Spell Haste</option>
              <option class="opt-buff">Resist</option>
              <option class="opt-buff">Invisibility</option>
              <option class="opt-buff">Damage Shield</option>
              <option class="opt-buff">Absorb Damage Shield</option>
              <option class="opt-buff">Mana Regen</option>
              <option class="opt-buff">Health Regen</option>
              <option class="opt-buff">Transfer Health</option>
              <option class="opt-buff">Transfer Mana</option>
              <option class="opt-buff">Damage Reduction</option>
              <option value="__cat__UTILITY" class="dropdown-cat-option cat-utility">▶ UTILITY</option>
              <option class="opt-utility">Pet</option>
              <option class="opt-utility">Purge</option>
              <option class="opt-utility">Cure</option>
              <option class="opt-utility">Feign Death</option>
              <option class="opt-utility">Taunt</option>
              <option class="opt-utility">Aggro Gen</option>
              <option class="opt-utility">Trap</option>
              <option class="opt-utility">Enduring Breath</option>
              <option class="opt-utility">Stealth / Hide</option>
              <option class="opt-utility">Aggro Reduction</option>
              <option class="opt-utility">Tracking</option>
              <option class="opt-utility">Bind</option>
              <option class="opt-utility">Teleport</option>
              <option class="opt-utility">Gate</option>
              <option class="opt-utility">Conjure Weapon</option>
              <option class="opt-utility">Conjure Arrows</option>
              <option class="opt-utility">Conjure Bandage</option>
              <option class="opt-utility">Conjure Food &amp; Water</option>
              <option class="opt-utility">Summon Manastone</option>
              <option class="opt-utility">Summon Lifestone</option>
              <option class="opt-utility">Shapeshift</option>
              <option class="opt-utility">Misc.</option>
              <option value="__cat__SITUATIONAL" class="dropdown-cat-option cat-situational">▶ SITUATIONAL</option>
              <option class="opt-situational">AoE</option>
              <option class="opt-situational">AURA</option>
              <option class="opt-situational" value="(pet only)">(pet only)</option>
              <option class="opt-situational" value="(undead only)">(undead only)</option>
              <option class="opt-situational" value="(elementals only)">(elementals only)</option>
              <option class="opt-situational" value="(animals only)">(animals only)</option>
              <option class="opt-situational" value="(self only)">(self only)</option>
              <option class="opt-situational">Physical</option>
              <option class="opt-situational">Fire</option>
              <option class="opt-situational">Cold</option>
              <option class="opt-situational">Electricity</option>
              <option class="opt-situational">Poison</option>
              <option class="opt-situational">Disease</option>
              <option class="opt-situational">Corruption</option>
              <option class="opt-situational">Magic</option>
              <option class="opt-situational">Holy</option>
            </select>
          </div>

          <div class="lib-filter-group">
            <label class="lib-filter-label">Level Range</label>
            <div class="level-range-row">
              <input type="number" id="level-min" placeholder="Min" min="1" />
              <span class="level-range-sep">—</span>
              <input type="number" id="level-max" placeholder="Max" min="1" />
            </div>
          </div>

          <div class="lib-filter-group">
            <label class="lib-filter-label" for="filter-skill">Filter by Skill</label>
            <select id="filter-skill">
              <option value="">All Skills</option>
            </select>
          </div>

          <!-- BROOM: clears only search/tag/level/skill filters -->
          <div class="lib-filter-group lib-filter-group-broom">
            <button id="clear-filters" class="broom-btn" title="Clear filters">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 21l7-7"/>
                <path d="M10 14l1.5-1.5"/>
                <path d="M11.5 12.5L20 4l-4-4-8.5 8.5"/>
                <path d="M8 16c-1.5 1.5-5 2-5 2s.5-3.5 2-5"/>
              </svg>
            </button>
          </div>

        </div>
      </div>

      <!-- RESULT COUNT -->
      <div id="result-count" style="color: var(--text-muted); font-size:0.85rem; margin-bottom:12px;"></div>

      <!-- TABLE -->
      <div id="spell-table-wrap">
        <table id="spell-table">
          <thead>
            <tr>
              <th data-col="Level">Lvl</th>
              <th data-col="Spell Name">Spell Name</th>
              <th class="no-sort">Description</th>
              <th class="no-sort">Skill</th>
              <th class="no-sort">Mana</th>
              <th data-col="Tag">Tags</th>
              <th data-col="Class">Class</th>
            </tr>
          </thead>
          <tbody id="spell-tbody">
            <tr><td colspan="7" class="no-results">Loading spell data...</td></tr>
          </tbody>
        </table>
      </div>

    </section>
  </main>

  <!-- DISCLAIMER POPUP -->
  <div id="notice-overlay" class="notice-overlay" style="display:none;">
    <div class="notice-card">
      <div class="notice-header">
        <span class="notice-title" id="notice-title"></span>
        <button class="notice-close" id="notice-close" title="Close">&#10005;</button>
      </div>
      <div class="notice-body" id="notice-body"></div>
      <div class="notice-footer">
        <span class="notice-updated">Last Updated: <strong id="notice-date"></strong></span>
        <a id="notice-link" href="#" target="_blank" rel="noopener" class="notice-link-btn"></a>
      </div>
    </div>
  </div>

  <!-- SCROLL TO TOP BUTTON -->
  <button id="scroll-top-btn" class="scroll-top-btn" title="Back to top" aria-label="Scroll to top">
    &#8679;
  </button>

  <script src="script.js"></script>
</body>
</html>
